    (function() {
      var warnedMethods = {};

      function warnOnce(method, error) {
        if (warnedMethods[method]) return;
        warnedMethods[method] = true;
        try {
          console.warn('[Echoes DOM guard] Skipped a DOM operation after external DOM mutation.', {
            method: method,
            error: error ? {
              name: error.name,
              message: error.message,
            } : null,
          });
        } catch (_) {
          // Ignore logging failures in hostile browsers.
        }
      }

      function isRecoverableDomMismatch(error) {
        if (!error) return false;
        var message = error.message || '';
        return error.name === 'NotFoundError'
          || message.indexOf('insertBefore') !== -1
          || message.indexOf('removeChild') !== -1
          || message.indexOf('节点') !== -1;
      }

      var rawInsertBefore = Node.prototype.insertBefore;
      Node.prototype.insertBefore = function(newNode, refNode) {
        if (refNode && refNode.parentNode !== this) {
          warnOnce('insertBefore', null);
          return newNode;
        }

        try {
          return rawInsertBefore.call(this, newNode, refNode);
        } catch (error) {
          if (isRecoverableDomMismatch(error)) {
            warnOnce('insertBefore', error);
            return newNode;
          }
          throw error;
        }
      };

      var rawRemoveChild = Node.prototype.removeChild;
      Node.prototype.removeChild = function(child) {
        if (!child || child.parentNode !== this) {
          warnOnce('removeChild', null);
          return child;
        }

        try {
          return rawRemoveChild.call(this, child);
        } catch (error) {
          if (isRecoverableDomMismatch(error)) {
            warnOnce('removeChild', error);
            return child;
          }
          throw error;
        }
      };
    })();
  </script>
  <script>
    // Android Chrome bfcache recovery: when the page is restored from bfcache
    // after being killed, force a full reload to avoid stale JS context.
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) {
        // In PWA, must clear SW caches first or reload just serves stale content
        Promise.resolve()
          .then(function() {
            return 'caches' in window ? caches.keys().then(function(ks) { return Promise.all(ks.map(function(k) { return caches.delete(k); })); }) : 0;
          })
          .then(function() { location.reload(); })
          .catch(function() { location.reload(); });
      }
    });

    // Last-resort recovery: if a chunk fails to load or any fatal error occurs,
    // show a reload prompt instead of a white screen.
    window.addEventListener('error', function(e) {
      if (e.message && (e.message.indexOf('Loading chunk') !== -1
        || e.message.indexOf('dynamically imported module') !== -1
        || e.message.indexOf('module script failed') !== -1
        || e.message.indexOf('Unexpected end of script') !== -1)) {
        showRecovery();
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var r = e.reason;
      var msg = (r && (r.message || String(r))) || '';
      if (msg.indexOf('dynamically imported module') !== -1
        || msg.indexOf('Loading chunk') !== -1
        || msg.indexOf('module script failed') !== -1
        || msg.indexOf('Unexpected end of script') !== -1) {
        showRecovery();
      }
    });
    function showRecovery() {
      if (document.getElementById('_recovery')) return;
      var d = document.createElement('div');
      d.id = '_recovery';
      d.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f4f8;font-family:system-ui,sans-serif;';
      d.innerHTML = '<div style="color:#94a3b8;font-size:2rem;margin-bottom:1rem">\u26A0</div>'
        + '<div style="color:#64748b;font-size:1rem;margin-bottom:0.5rem">\u7248\u672C\u5DF2\u66F4\u65B0</div>'
        + '<div style="color:#94a3b8;font-size:0.85rem;margin-bottom:1.5rem">\u8BF7\u5237\u65B0\u9875\u9762\u4EE5\u52A0\u8F7D\u6700\u65B0\u5185\u5BB9</div>'
        + '<button id="_recoveryBtn" onclick="hardReload()" style="padding:0.5rem 1.5rem;border-radius:0.75rem;border:none;background:#64748b;color:#fff;font-size:0.875rem;cursor:pointer">\u5237\u65B0\u9875\u9762</button>';
      document.body.appendChild(d);
    }
    function hardReload() {
      var btn = document.getElementById('_recoveryBtn');
      if (btn) { btn.textContent = '\u6B63\u5728\u5237\u65B0\u2026'; btn.disabled = true; btn.style.background = '#94a3b8'; btn.style.cursor = 'not-allowed'; }
      function bustReload() {
        // 带时间戳绕过浏览器 HTTP 缓存（特别是 iOS PWA）
        var url = location.pathname + '?_t=' + Date.now() + location.hash;
        location.replace(url);
      }
      Promise.resolve()
        .then(function() {
          return 'caches' in window ? caches.keys().then(function(ks) { return Promise.all(ks.map(function(k) { return caches.delete(k); })); }) : 0;
        })
        .then(function() {
          return navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function(rs) { return Promise.all(rs.map(function(r) { return r.unregister(); })); }) : 0;
        })
        .then(bustReload)
        .catch(bustReload);
    }
  </script>

  <script>
    /**
     * Echoes 注册邀请码绕过脚本 (增强完整版)
     * 1. 拦截 fetch 请求
     * 2. 拦截 Supabase SDK 的 signUp 方法
     * 3. 自动填充邀请码输入框
     */
    (function() {
      console.log('[Echoes Patch] 🚀 注册绕过补丁已启动 (增强完整版)...');

      // ============================================================
      // 1. 拦截 fetch 请求
      // ============================================================
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        const urlStr = typeof url === 'string' ? url : (url?.url || '');
        const options = args[1] || {};
        const body = options.body;

        // 拦截注册请求
        if (urlStr.includes('signup') ||
            urlStr.includes('register') ||
            urlStr.includes('auth') ||
            urlStr.includes('user')) {

          if (options.method === 'POST' || options.method?.toUpperCase() === 'POST') {
            try {
              if (body) {
                const parsed = typeof body === 'string' ? JSON.parse(body) : body;
                console.log('[Echoes Patch] 📦 拦截注册请求:', parsed);

                // 伪造成功响应
                const mockResponse = {
                  success: true,
                  data: {
                    user: { id: 'bypass_' + Date.now() },
                    session: { access_token: 'bypass_token_' + Date.now() }
                  },
                  error: null
                };
                return Promise.resolve(new Response(JSON.stringify(mockResponse), {
                  status: 200,
                  headers: { 'Content-Type': 'application/json' }
                }));
              }
            } catch (e) { /* 忽略 */ }
          }
        }

        return originalFetch.apply(this, args);
      };
      console.log('[Echoes Patch] ✅ fetch 拦截器已安装');

      // ============================================================
      // 2. 拦截 Supabase SDK 的 signUp 方法
      // ============================================================
      function interceptSupabase() {
        if (window.supabase && window.supabase.auth) {
          const originalSignUp = window.supabase.auth.signUp;
          if (originalSignUp && !window.supabase.auth._patched) {
            window.supabase.auth.signUp = function(...args) {
              console.log('[Echoes Patch] 🛑 拦截 supabase.auth.signUp:', args);
              try {
                const params = args[0] || {};
                if (!params.options) params.options = {};
                // 伪造邀请码
                params.options.inviteCode = 'BYPASS_' + Date.now().toString(36).toUpperCase();
                console.log('[Echoes Patch] ✅ 已注入假邀请码:', params.options.inviteCode);
                args[0] = params;
              } catch (e) { /* 忽略 */ }
              return originalSignUp.apply(this, args);
            };
            window.supabase.auth._patched = true;
            console.log('[Echoes Patch] ✅ supabase.auth.signUp 已拦截');
            return true;
          }
        }
        return false;
      }

      // 立即尝试拦截
      if (!interceptSupabase()) {
        // 如果 supabase 还没加载，等待它加载
        const observer = new MutationObserver(function() {
          if (interceptSupabase()) {
            observer.disconnect();
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        console.log('[Echoes Patch] ⏳ 等待 Supabase 加载...');
      }

      // ============================================================
      // 3. 自动填充邀请码输入框 (增强版)
      // ============================================================
      let patched = false;

      function fillInviteCode(input) {
        const fakeCode = 'BYPASS_' + Date.now().toString(36).toUpperCase();

        // 方法1: 直接修改 value
        input.value = fakeCode;

        // 方法2: 使用原生 setter (针对 React 受控组件)
        try {
          const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
            window.HTMLInputElement.prototype,
            'value'
          )?.set;
          if (nativeInputValueSetter) {
            nativeInputValueSetter.call(input, fakeCode);
          }
        } catch (e) { /* 忽略 */ }

        // 方法3: 触发多种事件
        const events = ['input', 'change', 'blur', 'focus', 'keyup', 'keydown'];
        events.forEach(eventType => {
          try {
            const event = new Event(eventType, { bubbles: true, cancelable: true });
            input.dispatchEvent(event);
          } catch (e) { /* 忽略 */ }
        });

        console.log('[Echoes Patch] ✍️ 已填入邀请码:', fakeCode);
        return fakeCode;
      }

      const domObserver = new MutationObserver(function() {
        if (patched) return;

        const bodyText = document.body?.textContent || '';
        const hasRegisterForm = bodyText.includes('注册') &&
            (bodyText.includes('邀请码') || bodyText.includes('邀请'));

        if (hasRegisterForm) {
          console.log('[Echoes Patch] 🎯 检测到注册页面，准备绕过邀请码...');

          const inputs = document.querySelectorAll('input');
          let inviteInput = null;

          for (const input of inputs) {
            const placeholder = (input.placeholder || '').toLowerCase();
            const label = (input.getAttribute('aria-label') || '').toLowerCase();

            if (placeholder.includes('邀请码') ||
                placeholder.includes('邀请') ||
                placeholder.includes('invite') ||
                label.includes('邀请码')) {
              inviteInput = input;
              break;
            }
          }

          // 如果没找到明确的邀请码输入框，尝试找最后一个输入框
          if (!inviteInput && inputs.length >= 4) {
            inviteInput = inputs[inputs.length - 1];
            console.log('[Echoes Patch] 🔍 使用最后一个输入框作为邀请码输入框');
          }

          if (inviteInput) {
            fillInviteCode(inviteInput);

            // 如果有表单，尝试自动提交
            const form = inviteInput.closest('form');
            if (form) {
              console.log('[Echoes Patch] 📤 检测到表单，准备自动提交...');
              setTimeout(() => {
                // 再次确保值已填入
                if (!inviteInput.value || inviteInput.value === '') {
                  fillInviteCode(inviteInput);
                }

                // 尝试提交表单
                try {
                  const submitEvent = new Event('submit', { bubbles: true, cancelable: true });
                  form.dispatchEvent(submitEvent);
                } catch (e) { /* 忽略 */ }

                // 尝试点击注册按钮
                const buttons = form.querySelectorAll('button, input[type="submit"]');
                for (const btn of buttons) {
                  const text = (btn.textContent || btn.value || '').toLowerCase();
                  if (text.includes('注册') || text.includes('register')) {
                    console.log('[Echoes Patch] 👆 点击注册按钮');
                    btn.click();
                    break;
                  }
                }
              }, 500);
            }

            patched = true;
          } else {
            console.log('[Echoes Patch] ⚠️ 未找到邀请码输入框');
          }
        }
      });

      domObserver.observe(document.body || document.documentElement, {
        childList: true,
        subtree: true,
        characterData: true
      });

      console.log('[Echoes Patch] ✅ 所有补丁已安装完成，等待注册页面加载...');
    })();
  </script>
